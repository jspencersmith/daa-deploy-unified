## Detailed Configuration

### Example Configuration

```yaml
GCP_PROJECT_ID: project-9e091b7d-1e8e-4a4e-963
GCP_SERVICE_ACCOUNT_EMAIL: github-actions@project-9e091b7d-1e8e-4a4e-963.iam.gserviceaccount.com
GOOGLE_CLIENT_ID: 87748455115-483j472l7c7scjkcm8qpguen8jaa4ie6.apps.googleusercontent.com
REACT_APP_API_BASE_URL: https://api.detroitautomationacademy.com
SLACK_WEBHOOK_URL: https://hooks.slack.com/services/T12345678/B12345678/XXXXXXXXXXXXXXXXXX
PAGERDUTY_API_KEY: u+XXXXXXXXXXXXXXXXXXXXXXXXXX
```

### Usage in Workflows

```yaml
# In .github/workflows/deploy-cloud-run.yml

- name: Deploy to Cloud Run
  env:
    GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  run: |
    gcloud run deploy daa-crm-backend \
      --project ${{ env.GCP_PROJECT_ID }}

- name: Notify Slack
  env:
    SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
  run: |
    curl -X POST ${{ env.SLACK_WEBHOOK }} \
      -H 'Content-Type: application/json' \
      -d '{"text":"Deployment complete"}'
```

