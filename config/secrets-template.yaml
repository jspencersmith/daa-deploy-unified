# GitHub Secrets Configuration Template

**File Location:** GitHub Repository Settings → Secrets and variables → Actions

**Instructions:** Create these secrets in your GitHub repository. They will be automatically injected into CI/CD workflows.

---

## Required Secrets

### Google Cloud Platform (GCP)

#### `GCP_PROJECT_ID`
**Description:** Google Cloud Project ID  
**Value:** `project-9e091b7d-1e8e-4a4e-963`  
**Used By:**
- deploy-cloud-run.yml (gcloud deployment)
- Cloud Run service configuration
- GCR image tagging

**How to find:**
```bash
gcloud config get-value project
# or
gcloud projects list --format='value(project_id)'
```

#### `GCP_SERVICE_ACCOUNT_EMAIL`
**Description:** Service account email for Workload Identity  
**Value:** `github-actions@PROJECT_ID.iam.gserviceaccount.com`  
**Used By:**
- Workload Identity authentication
- Google Cloud auth action
- Service account impersonation

**How to find:**
```bash
gcloud iam service-accounts list --format='value(email)'
```

### Authentication Credentials

#### `GOOGLE_CLIENT_ID`
**Description:** OAuth 2.0 Client ID for enrollment portal  
**Value:** From Google Cloud Console → APIs & Services → Credentials  
**Used By:**
- React enrollment form (REACT_APP_GOOGLE_CLIENT_ID)
- Google login button
- OAuth flow

**How to create:**
```
1. Go to Google Cloud Console
2. APIs & Services → Credentials
3. Create OAuth 2.0 Client ID (Web application)
4. Add redirect URI: https://enroll.detroitautomationacademy.com
5. Copy Client ID (looks like: XXX-YYY.apps.googleusercontent.com)
```

### API Configuration

#### `REACT_APP_API_BASE_URL`
**Description:** Base URL for frontend to call backend API  
**Value:** `https://api.detroitautomationacademy.com`  
**Used By:**
- React enrollment portal (axios/fetch requests)
- Enrollment form submissions
- Backend API calls

**How to determine:**
```bash
# After Cloud Run deployment, find the service URL:
gcloud run services describe daa-crm-backend --region us-central1 --format 'value(status.url)'
# Copy the hostname part, e.g., daa-crm-backend-abc123.run.app
```

### Notification Integrations

#### `SLACK_WEBHOOK_URL` (Optional but Recommended)
**Description:** Slack webhook for #deployments channel  
**Value:** `https://hooks.slack.com/services/T.../B.../...`  
**Used By:**
- Deployment status notifications
- Slack #deployments channel alerts
- Error notifications

**How to create:**
```
1. Go to Slack workspace → Channel #deployments
2. Add Workflow or Incoming Webhook
3. Get webhook URL
4. Copy full URL to this secret
```

#### `PAGERDUTY_API_KEY` (Optional)
**Description:** PagerDuty API key for incident creation  
**Value:** From PagerDuty → API → Personal Use Tokens  
**Used By:**
- SEV-2 incident creation on deployment failure
- Incident escalation

**How to create:**
```
1. Go to PagerDuty → User menu → My Profile
2. API → Personal Use Tokens
3. Create token (scope: services:write, escalation_policies:read)
4. Copy token
```

