## Security Best Practices

### ✅ DO:

- ✅ Use GitHub Secrets (encrypted at rest)
- ✅ Rotate OAuth Client IDs annually
- ✅ Use service accounts instead of personal keys
- ✅ Limit secret permissions (principle of least privilege)
- ✅ Audit secret access logs
- ✅ Use Workload Identity (no long-lived keys)
- ✅ Update secrets when rotating credentials

### ❌ DON'T:

- ❌ Store secrets in code or .env files
- ❌ Log or print secret values
- ❌ Commit secrets to git history
- ❌ Share secrets via email or chat
- ❌ Use overly broad secret permissions
- ❌ Reuse secrets across environments
- ❌ Store secrets in documentation

