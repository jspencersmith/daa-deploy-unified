## Migration Path

### When Rotating Credentials

1. **Generate new credential** (e.g., new OAuth Client ID)
2. **Test in staging environment first**
   ```bash
   gh secret set GOOGLE_CLIENT_ID -b "NEW_ID"
   gh workflow run deploy-cloud-run.yml -f environment=staging
   ```
3. **Update production secret** when staging tests pass
   ```bash
   gh secret set GOOGLE_CLIENT_ID -b "NEW_ID"
   ```
4. **Redeploy to production**
   ```bash
   gh workflow run deploy-cloud-run.yml -f environment=production
   ```
5. **Monitor for errors** in Cloud Logging
6. **Clean up old credentials** after successful migration

