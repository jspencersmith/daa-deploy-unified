## Setup Instructions

### Step 1: Navigate to GitHub Repository Secrets

```
GitHub Repository
  → Settings
  → Secrets and variables
  → Actions
```

### Step 2: Add Each Secret

For each secret below, click "New repository secret" and enter:

### Step 3: Verify Secrets Are Set

```bash
# Check that all required secrets exist
gh secret list

# Should show:
# GCP_PROJECT_ID
# GCP_SERVICE_ACCOUNT_EMAIL
# GOOGLE_CLIENT_ID
# REACT_APP_API_BASE_URL
# SLACK_WEBHOOK_URL
```

