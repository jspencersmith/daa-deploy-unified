## Troubleshooting

### Secret Not Found in Workflow

**Problem:** Workflow fails with "secret not found"

**Solution:**
```bash
# 1. Verify secret exists
gh secret list | grep SECRET_NAME

# 2. Verify spelling matches exactly (case-sensitive)

# 3. Verify workflow uses correct syntax
# Should be: ${{ secrets.SECRET_NAME }}
# Not: ${SECRET_NAME} or $SECRET_NAME

# 4. Commit and push changes
git add .github/workflows/deploy-cloud-run.yml
git commit -m "Fix secret reference"
git push origin main
```

### OAuth Client ID Not Working

**Problem:** Enrollment form shows "Invalid Client ID"

**Solution:**
```bash
# 1. Verify Client ID in GCP Console
gcloud oauth-client list

# 2. Verify redirect URI is correct
# Should be: https://enroll.detroitautomationacademy.com

# 3. Update GitHub Secret
gh secret set GOOGLE_CLIENT_ID -b "NEW_CLIENT_ID"

# 4. Redeploy enrollment frontend
gh workflow run deploy-cloud-run.yml -f service=enrollment-frontend

# 5. Wait 2 minutes and test login
```

### API URL Not Resolving

**Problem:** Frontend gets 404 when calling backend

**Solution:**
```bash
# 1. Verify API backend is deployed and healthy
curl https://api.detroitautomationacademy.com/health

# 2. Check REACT_APP_API_BASE_URL value
# Should match actual backend URL

# 3. Update GitHub Secret if URL changed
gh secret set REACT_APP_API_BASE_URL -b "https://api.detroitautomationacademy.com"

# 4. Redeploy enrollment frontend
gh workflow run deploy-cloud-run.yml -f service=enrollment-frontend

# 5. Test again after deployment
```

